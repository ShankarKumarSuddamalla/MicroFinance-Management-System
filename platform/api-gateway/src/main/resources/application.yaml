server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: client-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/clients/**

management:
  endpoints:
    web:
      exposure:
        include: "*"


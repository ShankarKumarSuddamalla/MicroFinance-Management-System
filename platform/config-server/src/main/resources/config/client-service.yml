server:
  port: 8082

spring:
  application:
    name: client-service

  datasource:
    url: jdbc:postgresql://localhost:5432/microfinance_client
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka